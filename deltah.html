<!DOCTYPE html><html lang="ru"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Калькулятор относительной разности осадок</title><style>:root{--bg:#08111f;--card:#121d31;--a:#37c8ff;--b:#49e3a4;--t:#eef5ff;--m:#9cb4cf}*{box-sizing:border-box}body{margin:0;font-family:Segoe UI,Arial,sans-serif;background:radial-gradient(circle at top,#15345e,#08111f 65%);color:var(--t);display:flex;justify-content:center;padding:40px 16px}.card{width:min(520px,100%);background:#121d31;border:1px solid #28577d;border-radius:18px;padding:26px;box-shadow:0 15px 40px rgba(0,0,0,.45)}h1{text-align:center;margin:0;font-size:28px}.subtitle{text-align:center;color:var(--m);margin:8px 0 24px}.row{display:grid;grid-template-columns:1fr 90px;gap:10px}label{display:block;margin:14px 0 6px}input,select{padding:12px;border-radius:10px;border:1px solid #284464;background:#0a1527;color:#fff}button{width:100%;margin-top:22px;padding:14px;border:none;border-radius:12px;background:linear-gradient(90deg,var(--a),var(--b));font-weight:700;cursor:pointer}.result{margin-top:20px;background:#091322;padding:18px;border-radius:12px;text-align:center}.value{font-size:34px;color:var(--b);font-weight:700}.footer{text-align:center;color:var(--m);font-size:12px;margin-top:10px}</style></head><body><div class="card"><h1>Калькулятор относительной разности осадок</h1><div class="subtitle">Расчёт коэффициента Δh/L</div><label>Отметка датчика №1</label><div class="row"><input id="h1" type="number" step="any"><select id="u1"><option value="0.001">мм</option><option value="0.01">см</option><option value="1">м</option></select></div><label>Отметка датчика №2</label><div class="row"><input id="h2" type="number" step="any"><select id="u2"><option value="0.001">мм</option><option value="0.01">см</option><option value="1">м</option></select></div><label>Расстояние между датчиками</label><div class="row"><input id="L" type="number" step="any"><select id="uL"><option value="1">м</option><option value="0.001">мм</option><option value="0.01">см</option></select></div><button onclick="calc()">Рассчитать</button><div class="result"><div id="out" class="value">—</div></div><div class="footer">Результат выводится в безразмерном виде (Δh/L)</div></div><script>function calc(){const h1=document.getElementById("h1").value,h2=document.getElementById("h2").value,L=document.getElementById("L").value;if(h1===""||h2===""||L===""||Number(L)===0){document.getElementById("out").textContent="Введите данные";return}const r=((Number(h2)*Number(document.getElementById("u2").value)-Number(h1)*Number(document.getElementById("u1").value))/(Number(L)*Number(document.getElementById("uL").value))).toFixed(8).replace(".",",");document.getElementById("out").textContent=r;}</script></body></html>
