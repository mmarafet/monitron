<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Монитрон — каталог инструментов</title>
  <style>
    :root {
      --bg: #07111f;
      --bg2: #0b1728;
      --card: rgba(255,255,255,.075);
      --card2: rgba(255,255,255,.11);
      --text: #eef6ff;
      --muted: #9fb2c7;
      --line: rgba(255,255,255,.13);
      --accent: #50d890;
      --accent2: #36a3ff;
      --danger: #ff6b6b;
      --shadow: 0 18px 60px rgba(0,0,0,.35);
      --radius: 22px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 18% 10%, rgba(54,163,255,.32), transparent 30%),
        radial-gradient(circle at 88% 8%, rgba(80,216,144,.22), transparent 28%),
        radial-gradient(circle at 60% 92%, rgba(80,216,144,.14), transparent 38%),
        linear-gradient(135deg, var(--bg), var(--bg2));
    }

    a { color: inherit; text-decoration: none; }

    .wrap {
      width: min(1180px, calc(100% - 32px));
      margin: 0 auto;
      padding: 34px 0 56px;
    }

    .top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 18px;
      margin-bottom: 24px;
    }

    .brand {
      display: flex;
      gap: 14px;
      align-items: center;
    }

    .logo {
      width: 56px;
      height: 56px;
      border-radius: 18px;
      display: grid;
      place-items: center;
      background: linear-gradient(145deg, rgba(80,216,144,.24), rgba(54,163,255,.18));
      border: 1px solid var(--line);
      box-shadow: var(--shadow);
      font-size: 28px;
    }

    h1 {
      margin: 0;
      font-size: clamp(30px, 5vw, 58px);
      line-height: .98;
      letter-spacing: -.04em;
    }

    .subtitle {
      margin: 10px 0 0;
      color: var(--muted);
      font-size: 16px;
      max-width: 760px;
      line-height: 1.5;
    }

    .actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .btn {
      border: 1px solid var(--line);
      background: rgba(255,255,255,.08);
      color: var(--text);
      padding: 11px 14px;
      border-radius: 999px;
      cursor: pointer;
      font-weight: 700;
      backdrop-filter: blur(12px);
      transition: transform .16s ease, background .16s ease, border-color .16s ease;
    }

    .btn:hover {
      transform: translateY(-1px);
      background: rgba(255,255,255,.13);
      border-color: rgba(255,255,255,.28);
    }

    .panel {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: rgba(255,255,255,.055);
      box-shadow: var(--shadow);
      overflow: hidden;
      backdrop-filter: blur(18px);
    }

    .toolbar {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 14px;
      padding: 16px;
      border-bottom: 1px solid var(--line);
      background: rgba(255,255,255,.04);
    }

    .search {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 14px 16px;
      color: var(--text);
      background: rgba(0,0,0,.18);
      outline: none;
      font-size: 16px;
    }

    .search::placeholder { color: rgba(238,246,255,.45); }

    .stats {
      display: flex;
      gap: 10px;
      align-items: center;
      color: var(--muted);
      white-space: nowrap;
      font-size: 14px;
    }

    .pill {
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 10px 12px;
      background: rgba(255,255,255,.055);
    }

    .breadcrumbs {
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
      padding: 16px 18px 0;
      color: var(--muted);
      font-size: 14px;
    }

    .breadcrumbs a {
      color: var(--text);
      border-bottom: 1px dashed rgba(255,255,255,.28);
    }

    .content { padding: 18px; }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(245px, 1fr));
      gap: 14px;
    }

    .card {
      position: relative;
      min-height: 150px;
      border: 1px solid var(--line);
      border-radius: 20px;
      background: var(--card);
      padding: 18px;
      overflow: hidden;
      transition: transform .16s ease, background .16s ease, border-color .16s ease;
    }

    .card::before {
      content: "";
      position: absolute;
      inset: auto -40px -55px auto;
      width: 120px;
      height: 120px;
      border-radius: 999px;
      background: rgba(80,216,144,.12);
      pointer-events: none;
    }

    .card.folder::before { background: rgba(54,163,255,.16); }
    .card.page::before { background: rgba(80,216,144,.14); }

    .card:hover {
      transform: translateY(-3px);
      background: var(--card2);
      border-color: rgba(255,255,255,.25);
    }

    .icon {
      width: 46px;
      height: 46px;
      display: grid;
      place-items: center;
      border-radius: 16px;
      background: rgba(255,255,255,.08);
      border: 1px solid var(--line);
      font-size: 23px;
      margin-bottom: 15px;
    }

    .card-title {
      font-size: 18px;
      line-height: 1.24;
      margin: 0 0 8px;
      font-weight: 850;
      letter-spacing: -.01em;
    }

    .card-desc {
      margin: 0;
      color: var(--muted);
      line-height: 1.45;
      font-size: 14px;
      word-break: break-word;
    }

    .path {
      margin-top: 14px;
      color: rgba(238,246,255,.42);
      font-size: 12px;
      word-break: break-all;
    }

    .empty, .error, .loading {
      padding: 38px 18px;
      text-align: center;
      color: var(--muted);
      line-height: 1.6;
    }

    .error strong { color: var(--danger); }

    .loader {
      width: 46px;
      height: 46px;
      border: 4px solid rgba(255,255,255,.14);
      border-top-color: var(--accent);
      border-radius: 50%;
      margin: 0 auto 14px;
      animation: spin .9s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .footer {
      margin-top: 18px;
      color: rgba(238,246,255,.42);
      font-size: 13px;
      text-align: center;
    }

    @media (max-width: 760px) {
      .top { flex-direction: column; }
      .actions { justify-content: flex-start; }
      .toolbar { grid-template-columns: 1fr; }
      .stats { white-space: normal; flex-wrap: wrap; }
    }
  </style>
</head>
<body>
  <main class="wrap">
    <section class="top">
      <div class="brand">
        <div class="logo">⌁</div>
        <div>
          <h1 id="pageTitle">Монитрон</h1>
          <p class="subtitle" id="pageSubtitle">Динамический каталог HTML-страниц и папок рабочего репозитория.</p>
        </div>
      </div>
      <div class="actions">
        <button class="btn" id="backBtn" type="button">← Назад</button>
        <button class="btn" id="refreshBtn" type="button">Обновить</button>
        <a class="btn" href="https://github.com/mmarafet/monitron" target="_blank" rel="noopener">GitHub</a>
      </div>
    </section>

    <section class="panel">
      <div class="toolbar">
        <input class="search" id="searchInput" type="search" placeholder="Поиск по названию, описанию или пути..." autocomplete="off" />
        <div class="stats">
          <span class="pill" id="folderCount">Папок: —</span>
          <span class="pill" id="pageCount">Страниц: —</span>
        </div>
      </div>
      <nav class="breadcrumbs" id="breadcrumbs"></nav>
      <div class="content" id="content">
        <div class="loading"><div class="loader"></div>Загружаю структуру репозитория...</div>
      </div>
    </section>

    <div class="footer">
      Названия страниц берутся из &lt;title&gt;. Названия папок — из title.txt внутри папки или из имени папки.
    </div>
  </main>

  <script>
    const CONFIG = {
      owner: "mmarafet",
      repo: "monitron",
      branch: "main",
      rootTitle: "Монитрон",
      rootDescription: "Динамический каталог HTML-страниц и папок рабочего репозитория."
    };

    const state = {
      path: "",
      entries: [],
      currentMeta: null,
      query: "",
      cache: new Map()
    };

    const els = {
      pageTitle: document.getElementById("pageTitle"),
      pageSubtitle: document.getElementById("pageSubtitle"),
      content: document.getElementById("content"),
      breadcrumbs: document.getElementById("breadcrumbs"),
      search: document.getElementById("searchInput"),
      folderCount: document.getElementById("folderCount"),
      pageCount: document.getElementById("pageCount"),
      refreshBtn: document.getElementById("refreshBtn"),
      backBtn: document.getElementById("backBtn")
    };

    function encodePath(path) {
      return path.split("/").filter(Boolean).map(encodeURIComponent).join("/");
    }

    function decodeHashPath() {
      const raw = location.hash.replace(/^#\/?/, "");
      try { return decodeURIComponent(raw).replace(/^\/+|\/+$/g, ""); }
      catch { return raw.replace(/^\/+|\/+$/g, ""); }
    }

    function hashForPath(path) {
      return "#/" + encodePath(path);
    }

    function fileUrl(path) {
      return encodePath(path);
    }

    function apiUrl(path = "") {
      const encoded = encodePath(path);
      const suffix = encoded ? "/" + encoded : "";
      return `https://api.github.com/repos/${CONFIG.owner}/${CONFIG.repo}/contents${suffix}?ref=${encodeURIComponent(CONFIG.branch)}`;
    }

    function rawUrl(path) {
      return `https://raw.githubusercontent.com/${CONFIG.owner}/${CONFIG.repo}/${CONFIG.branch}/${encodePath(path)}`;
    }

    function esc(value) {
      return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function cleanName(name) {
      return decodeURIComponent(name)
        .replace(/\.html?$/i, "")
        .replace(/[-_]+/g, " ")
        .trim();
    }

    async function fetchText(path) {
      const key = "text:" + path;
      if (state.cache.has(key)) return state.cache.get(key);
      const res = await fetch(rawUrl(path), { cache: "no-store" });
      if (!res.ok) throw new Error(`Не удалось прочитать ${path}`);
      const text = await res.text();
      state.cache.set(key, text);
      return text;
    }

    async function listDirectory(path) {
      const key = "dir:" + path;
      if (state.cache.has(key)) return state.cache.get(key);
      const res = await fetch(apiUrl(path), { cache: "no-store" });
      if (!res.ok) {
        if (res.status === 403) throw new Error("GitHub API временно ограничил запросы. Подожди пару минут и обнови страницу.");
        if (res.status === 404) throw new Error("Папка не найдена. Проверь имя папки и ветку main.");
        throw new Error(`GitHub API вернул ошибку ${res.status}.`);
      }
      const data = await res.json();
      const list = Array.isArray(data) ? data : [];
      state.cache.set(key, list);
      return list;
    }

    async function readTitleTxt(path) {
      try {
        const text = await fetchText(path ? `${path}/title.txt` : "title.txt");
        const lines = text.replace(/^\uFEFF/, "").split(/\r?\n/).map(x => x.trim()).filter(Boolean);
        return {
          title: lines[0] || null,
          description: lines.slice(1).join(" ") || null
        };
      } catch {
        return { title: null, description: null };
      }
    }

    async function pageMeta(item) {
      let title = cleanName(item.name);
      let description = "HTML-страница";
      try {
        const text = await fetchText(item.path);
        const doc = new DOMParser().parseFromString(text, "text/html");
        const docTitle = doc.querySelector("title")?.textContent?.trim();
        const metaDesc = doc.querySelector('meta[name="description"]')?.getAttribute("content")?.trim();
        const h1 = doc.querySelector("h1")?.textContent?.trim();
        title = docTitle || h1 || title;
        description = metaDesc || h1 || description;
      } catch {}
      return {
        type: "page",
        name: item.name,
        path: item.path,
        title,
        description
      };
    }

    async function folderMeta(item) {
      const meta = await readTitleTxt(item.path);
      return {
        type: "folder",
        name: item.name,
        path: item.path,
        title: meta.title || cleanName(item.name),
        description: meta.description || "Папка с материалами и HTML-страницами"
      };
    }

    function sortEntries(entries) {
      return entries.sort((a, b) => {
        if (a.type !== b.type) return a.type === "folder" ? -1 : 1;
        return a.title.localeCompare(b.title, "ru", { sensitivity: "base" });
      });
    }

    async function load(path = "") {
      state.path = path;
      state.entries = [];
      els.content.innerHTML = `<div class="loading"><div class="loader"></div>Загружаю каталог...</div>`;
      els.folderCount.textContent = "Папок: —";
      els.pageCount.textContent = "Страниц: —";

      try {
        const [items, currentMeta] = await Promise.all([
          listDirectory(path),
          path ? readTitleTxt(path) : readTitleTxt("")
        ]);

        state.currentMeta = currentMeta;
        const visibleItems = items.filter(item => {
          if (item.name.startsWith(".")) return false;
          if (item.name.toLowerCase() === "title.txt") return false;
          if (item.type === "file") {
            if (!/\.html?$/i.test(item.name)) return false;
            if (!path && item.name.toLowerCase() === "index.html") return false;
          }
          return item.type === "dir" || item.type === "file";
        });

        const metas = await Promise.all(visibleItems.map(item => item.type === "dir" ? folderMeta(item) : pageMeta(item)));
        state.entries = sortEntries(metas);
        updateHeader();
        renderBreadcrumbs();
        render();
      } catch (err) {
        els.content.innerHTML = `<div class="error"><strong>Ошибка загрузки.</strong><br>${esc(err.message || err)}</div>`;
      }
    }

    function updateHeader() {
      if (!state.path) {
        els.pageTitle.textContent = state.currentMeta?.title || CONFIG.rootTitle;
        els.pageSubtitle.textContent = state.currentMeta?.description || CONFIG.rootDescription;
      } else {
        const fallback = cleanName(state.path.split("/").pop());
        els.pageTitle.textContent = state.currentMeta?.title || fallback;
        els.pageSubtitle.textContent = state.currentMeta?.description || `Раздел: ${state.path}`;
      }
      document.title = els.pageTitle.textContent;
    }

    function renderBreadcrumbs() {
      const parts = state.path ? state.path.split("/").filter(Boolean) : [];
      const html = [`<a href="#/">Главная</a>`];
      let acc = "";
      parts.forEach(part => {
        acc = acc ? `${acc}/${part}` : part;
        html.push(`<span>/</span><a href="${hashForPath(acc)}">${esc(cleanName(part))}</a>`);
      });
      els.breadcrumbs.innerHTML = html.join("");
    }

    function render() {
      const q = state.query.trim().toLowerCase();
      const filtered = state.entries.filter(item => {
        const hay = `${item.title} ${item.description} ${item.path}`.toLowerCase();
        return !q || hay.includes(q);
      });

      const folders = filtered.filter(x => x.type === "folder").length;
      const pages = filtered.filter(x => x.type === "page").length;
      els.folderCount.textContent = `Папок: ${folders}`;
      els.pageCount.textContent = `Страниц: ${pages}`;

      if (!filtered.length) {
        els.content.innerHTML = `<div class="empty">Ничего не найдено. Добавь HTML-страницы или папки в репозиторий, либо очисти поиск.</div>`;
        return;
      }

      els.content.innerHTML = `<div class="grid">${filtered.map(cardHtml).join("")}</div>`;
    }

    function cardHtml(item) {
      if (item.type === "folder") {
        return `
          <a class="card folder" href="${hashForPath(item.path)}">
            <div class="icon">📁</div>
            <h2 class="card-title">${esc(item.title)}</h2>
            <p class="card-desc">${esc(item.description)}</p>
            <div class="path">${esc(item.path)}/</div>
          </a>`;
      }
      return `
        <a class="card page" href="${fileUrl(item.path)}">
          <div class="icon">📄</div>
          <h2 class="card-title">${esc(item.title)}</h2>
          <p class="card-desc">${esc(item.description)}</p>
          <div class="path">${esc(item.path)}</div>
        </a>`;
    }

    els.search.addEventListener("input", () => {
      state.query = els.search.value;
      render();
    });

    els.refreshBtn.addEventListener("click", () => {
      state.cache.clear();
      load(state.path);
    });

    els.backBtn.addEventListener("click", () => {
      if (!state.path) return;
      const parts = state.path.split("/").filter(Boolean);
      parts.pop();
      location.hash = hashForPath(parts.join("/"));
    });

    window.addEventListener("hashchange", () => {
      els.search.value = "";
      state.query = "";
      load(decodeHashPath());
    });

    load(decodeHashPath());
  </script>
</body>
</html>
